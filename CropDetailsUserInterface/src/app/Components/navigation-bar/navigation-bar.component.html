<div class="superNav border-bottom  bg-light" style="color: #7a7a7a;">
  <nav class="navbar navbar-expand-lg  sticky-top navbar-light p-3" style="color: #7a7a7a;">
    <div class="container">
      <a class="navbar-brand"><i class="fa-solid fa-shop me-2"></i><strong style="font-size: 20px;">Crop Deal</strong></a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavDropdown" aria-controls="navbarNavDropdown" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse justify-content-between" id="navbarNavDropdown">
        <!-- Empty div for centering -->
        <!-- <div></div> -->
        <div class="ms-auto d-none d-lg-block">
          <div class="input-group">
            <span class="border-success input-group-text bg-success text-white"><i class="fa-solid fa-magnifying-glass"></i></span>
            <input type="text" class="form-control border-success" style="color:#7a7a7a" [(ngModel)] ="searchCrop" >
            <button type="button" class="btn btn-success text-white" [routerLink] ="['/User','SearchCrop',searchCrop]" >Search</button>
          </div>
        </div>
        
        <!-- Empty div for centering -->
        <!-- <div></div> -->
      </div>

      <ul class="navbar-nav ms-auto ">
        <li class="nav-item">
          <a class="mx-2 text-uppercase" *ngIf="authService.isRole() === null" (click) = "home()"><i class="fa-solid fa-cart-shopping me-1"></i> Home</a>
        </li>
        <li class="nav-item">
          <a class="mx-2 text-uppercase" *ngIf="authService.isRole() !== null" (click) = "homeLoggedIn()"><i class="fa-solid fa-cart-shopping me-1"></i> Dashboard</a>
        </li>
        <li class="nav-item" *ngIf="authService.isRole() === null">
          <a class="mx-2 text-uppercase" (click) = "login()"><i class="fa-solid fa-circle-user me-1"></i> Login</a>
        </li>
        <li class="nav-item" *ngIf="authService.isRole() === null">
          <a class="mx-2 text-uppercase" (click) ="register()"><i class="fa-solid fa-circle-user me-1"></i> Register</a>
        </li>
        
        <li class="nav-item" *ngIf="authService.isRole() !== null">
          <a class="mx-2 text-uppercase" (click) ="viewProfile()"><i class="fa-solid fa-circle-user me-1"></i> View Profile</a>
        </li>
        <li class="nav-item" *ngIf="authService.isRole() !== null">
          <a class=" mx-2 text-uppercase" (click) ="logout()"><i class="fa-solid fa-circle-user me-1"></i> Logout</a>
        </li>
      </ul>
      <!-- Search for mobile -->
      <div class="mx-auto my-3 d-lg-none d-sm-block d-xs-block" *ngIf="authService.isRole() !== null">
        <div class="input-group">
          <span class="border-success input-group-text bg-success text-white"><i class="fa-solid fa-magnifying-glass"></i></span>
          <input type="text" class="form-control border-success" style="color:#7a7a7a" [(ngModel)] ="searchCrop"  >
          <button type="button" class="btn btn-success text-white" [routerLink] ="['/User','SearchCrop',searchCrop]" >Search</button>
        </div>
      </div>
    </div>
  </nav>
</div>
