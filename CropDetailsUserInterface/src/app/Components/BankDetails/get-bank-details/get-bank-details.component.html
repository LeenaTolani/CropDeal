<div class="tips">
</div> 
<div class="container" style="padding-top:40px ;">
    <div class="col1" style="padding: 30px; margin-top: 70px;">
      
    <div style="margin-bottom: 10px;">
      <h4 style="color: #198754; font-weight: bold; text-align: center; margin-top: 1%;">Bank Details:</h4>     
    </div> 
    <div class="card" style="color: #198754;  font-weight: bold;">
      <div class="front">
        <div class="type">
          <img class="bankid"/>
        </div>
        <span class="chip" ></span>
        <span class="card_number" style="color: #198754;  font-weight: bold;">&#x25CF;&#x25CF;&#x25CF;&#x25CF; &#x25CF;&#x25CF;&#x25CF;&#x25CF; &#x25CF;&#x25CF;&#x25CF;&#x25CF; &#x25CF;&#x25CF;&#x25CF;&#x25CF; </span>
        <div class="date"><span class="date_value" style="color: #198754;  font-weight: bold;">MM / YYYY</span></div>
        <span class="fullname" style="color: #198754;  font-weight: bold;">FULL NAME</span>
      </div>
      <div class="back">
        <div class="magnetic"></div>
        <div class="bar"></div>
        <span class="seccode">&#x25CF;&#x25CF;&#x25CF;</span>
        <span class="chip"></span><span class="disclaimer">This card is property of Random Bank of Random corporation. <br> If found please return to Random Bank of Random corporation - 21968 Paris, Verdi Street, 34 </span>
      </div>
    </div>
  </div>
  <form class="col2" >
    <label style="color: #198754;  font-weight: bold;" >Bank Name</label>
    <input class="number" type="text" value={{bankDetails.bankName}} ng-disabled="all" >
    <label style="color: #198754;  font-weight: bold;" >Account Number</label>
    <input class="inputname" type="text" value={{bankDetails.accountNumber}} ng-disabled="all" >
    <label style="color: #198754;  font-weight: bold;" >IFSC Code</label>
    <input class="expire" type="text" value={{bankDetails.ifscCode}} ng-disabled="all">
     <button class="buy" style="background-color: #198754;  height: 40px;"  [routerLink]="['/User','EditBankDetails',bankDetails.accountId]" *ngIf="bankDetails.accountId !== 0">Edit Details</button>   
     
     <button class="buy" style="background-color: #198754;  height: 40px;"  [routerLink]="['/User','BankDetails']" *ngIf="bankDetails.accountId === 0">Add Details</button>   
     <button class="buy" style="background-color: #198754;  height: 40px;"  [routerLink]="['/User','Profile']">Back</button>
 </form>
</div>
